name: Backend Validation

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      run_sql_backend:
        description: "Run SQL-backed backend validation on self-hosted Windows runner"
        required: false
        default: false
        type: boolean

jobs:
  backend-core:
    name: Core Backend Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start local API for auth/security
        env:
          API_PORT: 3003
          PORT: 3003
          AUTH_PROVIDER: local
          AUTH_EXPOSE_RESET_CODE: "true"
          AUTH_REQUIRE_EMAIL_DELIVERY: "false"
          AUTH_SECURITY_STATUS_ENABLED: "true"
        run: |
          nohup node local-api-server.js > backend-core-api.log 2>&1 &

      - name: Wait for API health
        run: |
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3003/api/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "API did not become healthy in time"
          cat backend-core-api.log || true
          exit 1

      - name: Run backend CI checks
        env:
          API_BASE_URL: http://127.0.0.1:3003
          RUN_MOBILITY_BACKEND_TESTS: "false"
        run: npm run test:backend-ci

      - name: Build app
        env:
          CI: "true"
        run: npm run build

      - name: Upload API log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-core-api-log
          path: backend-core-api.log

  backend-sql:
    name: SQL Backend Checks
    needs: backend-core
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_sql_backend }}
    runs-on:
      - self-hosted
      - windows
    timeout-minutes: 25
    env:
      API_PORT: 3001
      PORT: 3001
      AUTH_PROVIDER: mssql
      AUTH_EXPOSE_RESET_CODE: "true"
      AUTH_REQUIRE_EMAIL_DELIVERY: "false"
      AUTH_SECURITY_STATUS_ENABLED: "true"
      MSSQL_SERVER: ${{ secrets.MSSQL_SERVER }}
      MSSQL_DATABASE: ${{ secrets.MSSQL_DATABASE }}
      MSSQL_USER: ${{ secrets.MSSQL_USER }}
      MSSQL_PASSWORD: ${{ secrets.MSSQL_PASSWORD }}
      RUN_MOBILITY_BACKEND_TESTS: "true"
      API_BASE_URL: http://127.0.0.1:3001
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        shell: powershell
        run: npm ci

      - name: Start local API against SQL Server
        shell: powershell
        run: |
          $job = Start-Job -ScriptBlock {
            Set-Location $using:GITHUB_WORKSPACE
            node local-api-server.js *> backend-sql-api.log
          }
          "job_id=$($job.Id)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        id: start_api

      - name: Wait for API health
        shell: powershell
        run: |
          $ok = $false
          for ($attempt = 0; $attempt -lt 30; $attempt++) {
            try {
              $response = Invoke-RestMethod -Uri "http://127.0.0.1:3001/api/health" -TimeoutSec 2
              if ($response.ok -eq $true) {
                $ok = $true
                break
              }
            } catch {}
            Start-Sleep -Seconds 2
          }
          if (-not $ok) {
            if (Test-Path backend-sql-api.log) { Get-Content backend-sql-api.log }
            throw "API did not become healthy in time"
          }

      - name: Run SQL-backed mobility validation
        shell: powershell
        run: npm run test:mobility-backend-local

      - name: Cleanup generated SQL test users
        if: always()
        shell: powershell
        run: npm run cleanup:test-users-local

      - name: Upload SQL API log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-sql-api-log
          path: backend-sql-api.log